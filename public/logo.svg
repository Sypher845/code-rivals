<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="280" rx="16" fill="#2b1f3a" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Noise overlay -->
  <rect width="280" height="280" rx="16" filter="url(#noise)" opacity="0.25" style="mix-blend-mode:overlay"/>

  <!-- Vignette -->
  <rect width="280" height="280" rx="16" fill="url(#vignette)"/>

  <!-- Minus decor -->
  <g opacity="0.7" transform="translate(32,32) rotate(20)"><line x1="3" y1="10" x2="17" y2="10" stroke="#ff5500" stroke-width="3.5" stroke-linecap="round"/></g>
  <g opacity="0.8" transform="translate(230,186) rotate(-15) scale(1.25)"><line x1="3" y1="10" x2="17" y2="10" stroke="#ff5500" stroke-width="3.5" stroke-linecap="round"/></g>
  <g opacity="0.6" transform="translate(240,93) rotate(60) scale(0.75)"><line x1="3" y1="10" x2="17" y2="10" stroke="#ff5500" stroke-width="3.5" stroke-linecap="round"/></g>
  <g opacity="0.7" transform="translate(16,70) rotate(15) scale(0.75)"><line x1="3" y1="10" x2="17" y2="10" stroke="#ff5500" stroke-width="3.5" stroke-linecap="round"/></g>
  <g opacity="0.5" transform="translate(70,210) rotate(-45)"><line x1="3" y1="10" x2="17" y2="10" stroke="#ff5500" stroke-width="3.5" stroke-linecap="round"/></g>
  <g opacity="0.8" transform="translate(93,40) rotate(75)"><line x1="3" y1="10" x2="17" y2="10" stroke="#ff5500" stroke-width="3.5" stroke-linecap="round"/></g>

  <!-- Sand grains (bg) -->
  <circle cx="140" cy="48" r="3" fill="#ffaa00"/>
  <circle cx="48" cy="240" r="4" fill="#ffaa00"/>
  <circle cx="210" cy="140" r="3" fill="#ffaa00"/>
  <circle cx="32" cy="186" r="2" fill="#ffaa00"/>
  <circle cx="232" cy="186" r="5" fill="#ffaa00"/>

  <!-- Main graphic group — centred in 280×280 -->
  <g transform="translate(140, 135)">

    <!-- Cyan aura star -->
    <g transform="scale(1.22)">
      <path d="M 0 -50 L -10 -35 L -35 -45 L -25 -25 L -50 -20 L -35 -5 L -45 15 L -25 10 L -20 35 L -5 20 L 5 45 L 15 20 L 30 35 L 25 10 L 45 15 L 35 -5 L 50 -20 L 25 -25 L 35 -45 L 10 -35 Z"
            fill="#0ae6df" stroke="#0ae6df" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>
    </g>

    <!-- Hourglass group (scaled from 100×100 to ~190×190) -->
    <g transform="translate(-95,-95) scale(1.9)">

      <!-- Black Void -->
      <ellipse cx="50" cy="90" rx="35" ry="8" fill="#1a1a1a"/>
      <ellipse cx="50" cy="90" rx="42" ry="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="4 6"/>

      <!-- Bottom half -->
      <g transform="translate(8, 2) rotate(12, 50, 80)">
        <path d="M 38 80 C 38 68, 43 62, 50 62 C 57 62, 62 68, 62 80 Z" fill="#ffaa00"/>
        <path d="M 38 80 C 38 72, 45 66, 50 66 C 55 66, 62 72, 62 80 Z" fill="#ffd60a" opacity="0.6"/>
        <circle cx="45" cy="75" r="1" fill="#cc4400" opacity="0.5"/>
        <circle cx="55" cy="73" r="0.8" fill="#cc4400" opacity="0.5"/>
        <circle cx="50" cy="70" r="1.2" fill="#cc4400" opacity="0.5"/>
        <circle cx="42" cy="78" r="1.5" fill="#cc4400" opacity="0.5"/>
        <circle cx="58" cy="77" r="1" fill="#cc4400" opacity="0.5"/>
        <circle cx="50" cy="77" r="1.5" fill="#cc4400" opacity="0.5"/>
        <path d="M 35 80 C 35 60, 42 55, 44 50 L 50 56 L 56 48 L 58 58 C 65 62, 65 80, 65 80 Z"
              fill="#e0f2fe" opacity="0.85" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
        <rect x="25" y="80" width="50" height="6" rx="2" fill="#d4c9b8" stroke="#1a1a1a" stroke-width="3"/>
        <line x1="30" y1="83" x2="70" y2="83" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
      </g>

      <!-- Sand grains scattered -->
      <g fill="#ffaa00" stroke="#1a1a1a" stroke-width="0.5">
        <circle cx="50" cy="42" r="1.5"/><circle cx="47" cy="45" r="1"/><circle cx="53" cy="46" r="2"/>
        <circle cx="50" cy="49" r="1"/><circle cx="45" cy="51" r="1.5"/><circle cx="55" cy="52" r="1.5"/>
        <circle cx="48" cy="55" r="2"/><circle cx="52" cy="58" r="1"/><circle cx="44" cy="60" r="1.5"/>
        <circle cx="56" cy="62" r="2"/><circle cx="50" cy="64" r="1"/><circle cx="46" cy="66" r="1.5"/>
        <circle cx="53" cy="68" r="1.5"/>
        <circle cx="49" cy="72" r="2"/><circle cx="55" cy="74" r="1"/><circle cx="45" cy="77" r="1.5"/>
        <circle cx="51" cy="79" r="2"/><circle cx="47" cy="82" r="1"/><circle cx="53" cy="84" r="1.5"/>
        <circle cx="50" cy="87" r="2"/><circle cx="45" cy="89" r="1.5"/><circle cx="55" cy="90" r="1"/>
        <circle cx="48" cy="92" r="1.5"/><circle cx="52" cy="93" r="2"/>
      </g>

      <!-- Top half -->
      <g transform="translate(-4, -4) rotate(-15, 50, 20)">
        <path d="M 38 16 L 62 16 C 62 25, 55 30, 50 35 C 45 30, 38 25, 38 16 Z" fill="#ffaa00"/>
        <path d="M 42 16 L 58 16 C 58 20, 52 24, 50 26 C 48 24, 42 20, 42 16 Z" fill="#ffd60a" opacity="0.6"/>
        <path d="M 35 16 C 35 35, 42 40, 44 44 L 50 38 L 54 42 L 58 35 C 65 30, 65 16, 65 16 Z"
              fill="#e0f2fe" opacity="0.85" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
        <path d="M 39 20 C 39 25, 42 30, 44 33" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
        <rect x="25" y="10" width="50" height="6" rx="2" fill="#d4c9b8" stroke="#1a1a1a" stroke-width="3"/>
        <line x1="30" y1="13" x2="70" y2="13" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
      </g>

      <!-- Shattered glass pieces -->
      <g fill="#e0f2fe" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round">
        <polygon points="35,45 42,42 40,50"/>
        <polygon points="65,38 72,40 68,48"/>
        <polygon points="25,55 32,52 28,60"/>
        <polygon points="75,55 80,62 70,60"/>
        <polygon points="58,35 62,32 64,38"/>
      </g>

      <!-- Action lines -->
      <g stroke="#1a1a1a" stroke-width="2" stroke-linecap="round">
        <line x1="28" y1="45" x2="20" y2="42"/>
        <line x1="72" y1="45" x2="80" y2="42"/>
        <line x1="25" y1="58" x2="18" y2="60"/>
        <line x1="75" y1="55" x2="85" y2="52"/>
      </g>

    </g>
  </g>
</svg>